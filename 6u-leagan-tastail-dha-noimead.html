<!DOCTYPE html>
<html lang="ga">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6ú – Tastáil Dhá Nóiméad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .screen { display: none; flex-direction: column; align-items: center;
              justify-content: center; gap: 20px; text-align: center;
              width: 100%; max-width: 540px; padding: 20px; }
    .screen.active { display: flex; }

    h1 { font-size: 3.5rem; color: #53d8fb; letter-spacing: 2px; }
    h2 { font-size: 2rem; color: #53d8fb; }
    .subtitle { font-size: 1.1rem; color: #aaa; }
    .best-line { font-size: 1rem; color: #888; }

    /* Game screen layout */
    #game-screen { gap: 16px; }

    /* Timer */
    #timer-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
    }
    #timer-display {
      font-size: 2.4rem;
      font-weight: bold;
      color: #53d8fb;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      min-width: 80px;
    }
    #timer-display.warning { color: #ffc107; }
    #timer-display.danger  { color: #e94560; }
    #score-display {
      font-size: 2.4rem;
      font-weight: bold;
      color: #4caf50;
      min-width: 60px;
    }
    #score-label { font-size: 0.85rem; color: #888; align-self: flex-end; padding-bottom: 6px; }

    /* Word card */
    .card {
      background: #16213e;
      border-radius: 14px;
      padding: 28px 24px;
      width: 100%;
      font-size: 1.9rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 1px;
      min-height: 90px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .card.flash-correct { background: #1b4d2e; }
    .card.flash-wrong   { background: #4d1b1b; }

    /* Choices */
    .choices { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .choice-btn {
      width: 100%;
      padding: 15px 20px;
      border-radius: 10px;
      border: 2px solid #0f3460;
      background: #0f3460;
      color: #eee;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .key-hint {
      font-size: 1.1rem;
      opacity: 0.5;
      flex-shrink: 0;
      width: 1.2em;
      text-align: center;
    }
    .btn-text { flex: 1; text-align: left; }
    .choice-btn:hover:not(:disabled) { background: #1a4f8a; border-color: #53d8fb; }
    .choice-btn.selected-correct { background: #1b4d2e; border-color: #4caf50; color: #4caf50; }
    .choice-btn.selected-wrong   { background: #4d1b1b; border-color: #e94560; color: #e94560; }
    .choice-btn.reveal-correct   { background: #1b4d2e; border-color: #4caf50; color: #4caf50; }

    /* Flash */
    #pts-flash {
      font-size: 1.4rem;
      font-weight: bold;
      color: #4caf50;
      opacity: 0;
      transition: opacity 0.3s;
      height: 32px;
    }

    /* Over screen */
    .final-score-num { font-size: 5rem; font-weight: bold; color: #53d8fb; line-height: 1; }
    .final-sub       { font-size: 1rem; color: #aaa; }
    .best-line       { font-size: 1.1rem; color: #ffc107; }

    /* Buttons */
    .start-btn, .restart-btn {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      font-size: 1.1rem;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .start-btn:hover, .restart-btn:hover { background: #c73652; }
    .hint { font-size: 0.8rem; color: #555; }
  </style>
</head>

<!-- ══ START SCREEN ══════════════════════════════════════════════════════════ -->
<div id="start-screen" class="screen active">
  <h1>6ú</h1>
  <p class="subtitle">Tastáil Dhá Nóiméad</p>
  <p style="color:#ccc;max-width:340px;line-height:1.5;">
    Cé mhéad focal is féidir leat a aistriú i 2 nóiméad?<br>
    Saolta gan teorainn. Dhá rogha an gach focal.
  </p>
  <p id="start-best" class="best-line"></p>
  <button class="start-btn" onclick="startGame()">Tosaigh</button>
  <p class="hint">← → nó A / B a úsáid freisin</p>
</div>

<!-- ══ GAME SCREEN ═══════════════════════════════════════════════════════════ -->
<div id="game-screen" class="screen">

  <div id="timer-wrap">
    <div id="timer-display">2:00</div>
    <div id="score-label">ceart</div>
    <div id="score-display">0</div>
  </div>

  <div id="word-card" class="card">—</div>

  <div class="choices">
    <button class="choice-btn" id="choice-a" onclick="pick(0)"><span class="key-hint">↑</span><span class="btn-text"></span></button>
    <button class="choice-btn" id="choice-b" onclick="pick(1)"><span class="key-hint">↓</span><span class="btn-text"></span></button>
  </div>

  <div id="pts-flash">+1</div>

</div>

<!-- ══ OVER SCREEN ═══════════════════════════════════════════════════════════ -->
<div id="over-screen" class="screen">
  <h2>Am Istigh!</h2>

  <p class="final-sub">focal ceart</p>
  <p class="best-line" id="over-best"></p>
  <button class="restart-btn" onclick="startGame()">Arís</button>
</div>

const WORDS = Object.keys(DICT);
const GAME_MS = 120000; // 2 minutes

let score = 0, bestScore = 0;
let timerRAF, wordStartTime;
let gameStart, gameEnd;
let correctIdx = 0, locked = false;
let flashTimer;

try { bestScore = parseInt(localStorage.getItem('6u_best') || '0'); } catch(e){}

function show(id) {
  ['start-screen','game-screen','over-screen'].forEach(s => {
    const el = document.getElementById(s);
    el.classList.toggle('active', s === id);
  });
}

function fmt(ms) {
  const total = Math.max(0, Math.ceil(ms / 1000));
  const m = Math.floor(total / 60);
  const s = total % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function updateBestDisplay() {
  const el = document.getElementById('start-best');
  el.textContent = bestScore > 0 ? 'Is fearr: ' + bestScore + ' focal' : '';
}
updateBestDisplay();

function startGame() {
  score = 0;
  locked = false;
  gameEnd = Date.now() + GAME_MS;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('pts-flash').style.opacity = '0';
  show('game-screen');
  nextWord();
  tickTimer();
}

function sh(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function rnd(exclude) {
  let w;
  do { w = WORDS[Math.floor(Math.random() * WORDS.length)]; } while (w === exclude);
  return w;
}

function nextWord() {
  if (locked) return;
  const word = WORDS[Math.floor(Math.random() * WORDS.length)];
  const correct = DICT[word][0];
  const wrong = DICT[rnd(word)][0];
  const opts = sh([correct, wrong]);
  correctIdx = opts.indexOf(correct);

  document.getElementById('word-card').textContent = word;
  document.getElementById('word-card').className = 'card';

  const btns = [document.getElementById('choice-a'), document.getElementById('choice-b')];
  btns.forEach((b, i) => {
    b.querySelector('.btn-text').textContent = opts[i];
    b.className = 'choice-btn';
    b.disabled = false;
  });
}

function pick(idx) {
  if (locked) return;
  const remaining = gameEnd - Date.now();
  if (remaining <= 0) return;
  locked = true;

  const btns = [document.getElementById('choice-a'), document.getElementById('choice-b')];
  btns.forEach(b => b.disabled = true);

  if (idx === correctIdx) {
    score++;
    document.getElementById('score-display').textContent = score;
    showFlash('+1');
    btns[idx].className = 'choice-btn selected-correct';
    document.getElementById('word-card').className = 'card flash-correct';
  } else {
    btns[idx].className = 'choice-btn selected-wrong';
    btns[correctIdx].className = 'choice-btn reveal-correct';
    document.getElementById('word-card').className = 'card flash-wrong';
  }

  setTimeout(() => {
    locked = false;
    nextWord();
  }, 380);
}

function showFlash(txt) {
  const el = document.getElementById('pts-flash');
  el.textContent = txt;
  el.style.opacity = '1';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { el.style.opacity = '0'; }, 600);
}

function tickTimer() {
  const remaining = gameEnd - Date.now();
  if (remaining <= 0) {
    document.getElementById('timer-display').textContent = '0:00';
    endGame();
    return;
  }
  const td = document.getElementById('timer-display');
  td.textContent = fmt(remaining);
  if (remaining <= 15000)      td.className = 'danger';
  else if (remaining <= 30000) td.className = 'warning';
  else                         td.className = '';
  timerRAF = requestAnimationFrame(tickTimer);
}

function endGame() {
  cancelAnimationFrame(timerRAF);
  locked = true;
  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('6u_best', bestScore); } catch(e){}
    updateBestDisplay();
  }
  document.getElementById('final-score-num').textContent = score;
  const ob = document.getElementById('over-best');
  ob.textContent = score >= bestScore
    ? (bestScore > 0 ? '★ Scór is fearr nua! ' + bestScore : '')
    : 'Is fearr: ' + bestScore + ' focal';
  show('over-screen');
}

// Keyboard support below

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') { e.preventDefault(); pick(0); }
  if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); pick(1); }
});

show('start-screen');
</script>
