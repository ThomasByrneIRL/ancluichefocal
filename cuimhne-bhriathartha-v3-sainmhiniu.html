<title>An Foclóir — Sainmhíniú</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .screen { display: none; text-align: center; padding: 2rem; max-width: 520px; width: 100%; }
  h1 { font-size: 2rem; color: #e94560; margin-bottom: .5rem; }
  .subtitle { color: #aaa; margin-bottom: 2rem; font-size: .95rem; }
  .stats { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-label { color: #aaa; font-size: .8rem; display: block; }
  #score-val { color: #4caf50; font-size: 2rem; font-weight: bold; }
  #lives-val { font-size: 1.3rem; letter-spacing: 1px; }
  .card { background: #16213e; border-radius: 16px; padding: 2.5rem 2rem 1.5rem; margin-bottom: 1.5rem; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background .15s; box-shadow: 0 4px 24px #0005; }
  .card.flash-correct { background: #1a3a1a; }
  .card.flash-wrong { background: #3a1a1a; }
  #word-display { font-size: 2.6rem; font-weight: bold; letter-spacing: .04em; margin-bottom: .5rem; }
  #hint-text { font-size: .85rem; color: #ff9966; min-height: 1.2em; margin-top: .3rem; }
  .input-row { display: flex; gap: .6rem; margin-bottom: 1rem; }
  #answer-input { flex: 1; padding: .85rem 1rem; border: 2px solid #2a2a4a; border-radius: 10px; background: #16213e; color: #eee; font-size: 1.1rem; outline: none; transition: border-color .2s; }
  #answer-input:focus { border-color: #53d8fb; }
  #answer-input.correct { border-color: #4caf50; }
  #answer-input.wrong { border-color: #e94560; }
  #submit-btn { padding: .85rem 1.4rem; border: none; border-radius: 10px; background: #0f3460; color: #53d8fb; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: opacity .2s; }
  #submit-btn:hover { opacity: .85; }
  .hint { color: #555; font-size: .8rem; margin-top: .5rem; }
  .big-btn { background: #e94560; color: #fff; border: none; border-radius: 12px; padding: 1rem 2.5rem; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; transition: opacity .2s; }
  .big-btn:hover { opacity: .85; }
  #final-score { font-size: 4rem; font-weight: bold; color: #4caf50; margin: 1rem 0; }
</style>
</head>
<body>

<div id="start-screen" class="screen">
  <h1>🧠 An Foclóir</h1>
  <p class="subtitle">Cén Béarla atá ar an bhfocal? | 🔊 Fuaim Chonnacht</p>
  <p style="color:#aaa;margin-bottom:2rem;line-height:1.8">
    Feicfidh tú focal Gaeilge.<br>
    Cloisfeá an focal á rá.<br>
    Scríobh an t-aistriúchán Béarla.<br>
    10 croí agat.
  </p>
  <button class="big-btn" onclick="initGame()">Tosaígh</button>
</div>

<div id="game-screen" class="screen">
  <div class="stats">
    <div><span class="stat-label">Scór</span><span id="score-val">0</span></div>
    <div><span class="stat-label">Croíthe</span><span id="lives-val">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</span></div>
  </div>
  <div class="card" id="word-card">
    <div id="word-display"></div>
    <div id="hint-text"></div>
  </div>
  <div class="input-row">
    <input id="answer-input" type="text" placeholder="Scríobh i mBéarla..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <button id="submit-btn" onclick="submitAnswer()">→</button>
  </div>
  <p class="hint">Brúigh Iontráil nó → le freagra a thabhairt</p>
</div>

<div id="over-screen" class="screen">
  <h1>Críochnaithe!</h1>
  <div id="final-score"></div>
  <p style="color:#aaa;margin-bottom:2rem">focal cuimhnithe agat</p>
  <button class="big-btn" onclick="initGame()">Arís</button>
</div>

const WORDS = Object.keys(DICT);

let score, lives, locked, currentWord;
let _ca = null;

function playPron(word) {
  if (_ca) { _ca.pause(); _ca = null; }
  const a = new Audio('https://www.teanglann.ie/CanC/' + encodeURIComponent(word) + '.mp3');
  a.onerror = function(){};
  a.play().catch(function(){});
  _ca = a;
}

function sh(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let queue = [];
function pickWord() {
  if (queue.length === 0) queue = sh(WORDS);
  return queue.pop();
}

function initGame() {
  score = 0; lives = 10; locked = false;
  queue = sh(WORDS);
  updateStats();
  nextWord();
  show('game-screen');
  setTimeout(() => document.getElementById('answer-input').focus(), 100);
}

function nextWord() {
  locked = false;
  currentWord = pickWord();
  document.getElementById('word-display').textContent = currentWord;
  document.getElementById('hint-text').textContent = '';
  document.getElementById('word-card').className = 'card';
  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.className = '';
  playPron(currentWord);
  inp.focus();
}

function checkAnswer(input, validAnswers) {
  const clean = input.toLowerCase().trim().replace(/^(a |an |the |to )/, '').trim();
  if (!clean) return false;
  return validAnswers.some(ans => clean === ans.toLowerCase());
}

function submitAnswer() {
  if (locked) return;
  const inp = document.getElementById('answer-input');
  const val = inp.value.trim();
  if (!val) return;
  locked = true;

  const valid = DICT[currentWord];
  const correct = checkAnswer(val, valid);

  if (correct) {
    score++;
    inp.className = 'correct';
    document.getElementById('word-card').className = 'card flash-correct';
    updateStats();
    setTimeout(nextWord, 600);
  } else {
    lives--;
    inp.className = 'wrong';
    document.getElementById('word-card').className = 'card flash-wrong';
    document.getElementById('hint-text').textContent = '✓ ' + valid.join(' / ');
    updateStats();
    if (lives <= 0) setTimeout(gameOver, 1200);
    else setTimeout(nextWord, 1400);
  }
}

function updateStats() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('lives-val').textContent = '❤️'.repeat(lives) + '🖤'.repeat(10 - lives);
}

function gameOver() {
  document.getElementById('final-score').textContent = score;
  show('over-screen');
}

function show(id) {
  ['start-screen', 'game-screen', 'over-screen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

show('start-screen');
</script>
