<!DOCTYPE html>
<html lang="ga">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>An Foclóir — Tosaitheoirí</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .screen { display: none; text-align: center; padding: 2rem; max-width: 520px; width: 100%; }
  h1 { font-size: 2rem; color: #e94560; margin-bottom: .5rem; }
  .subtitle { color: #aaa; margin-bottom: 2rem; font-size: .95rem; }
  .top-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: .8rem; }
  .stat-label { color: #aaa; font-size: .8rem; display: block; }
  #score-running { color: #4caf50; font-size: 1.6rem; font-weight: bold; }
  #word-num { color: #53d8fb; font-size: 1.6rem; font-weight: bold; }
  #lives-val { font-size: 1.3rem; letter-spacing: 1px; }
  .progress-wrap { margin-bottom: 1.2rem; }
  #progress-bar-bg { background: #0f3460; border-radius: 8px; height: 8px; width: 100%; overflow: hidden; }
  #progress-bar { height: 8px; border-radius: 8px; background: #53d8fb; transition: width .3s; width: 0%; }
  .card { background: #16213e; border-radius: 16px; padding: 2.5rem 2rem 2rem; margin-bottom: 1.2rem; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 24px #0005; transition: background .15s; }
  .card.flash-correct { background: #1a3a1a; }
  .card.flash-wrong { background: #3a1a1a; }
  #word-display { font-size: 2.6rem; font-weight: bold; letter-spacing: .04em; }
  .choices { display: flex; flex-direction: column; gap: .75rem; margin-bottom: .6rem; }
  .choice-btn { width: 100%; padding: 1rem 1.2rem; border: 2px solid #2a2a4a; border-radius: 12px; background: #16213e; color: #eee; font-size: 1.05rem; cursor: pointer; text-align: left; transition: border-color .15s, background .15s; line-height: 1.4; }
  .choice-btn:hover:not(:disabled) { border-color: #53d8fb; background: #1a2a4a; }
  .choice-btn.selected-correct { border-color: #4caf50; background: #1a3a1a; color: #4caf50; font-weight: bold; }
  .choice-btn.selected-wrong { border-color: #e94560; background: #3a1a1a; color: #e94560; }
  .choice-btn.reveal-correct { border-color: #4caf50; background: #1a3a1a; color: #4caf50; }
  .choice-btn:disabled { cursor: default; }
  .hint { color: #555; font-size: .75rem; margin-top: .3rem; }
  .big-btn { background: #e94560; color: #fff; border: none; border-radius: 12px; padding: 1rem 2.5rem; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; }
  #final-pct { font-size: 5rem; font-weight: bold; color: #4caf50; margin: .5rem 0; }
  .final-detail { color: #aaa; font-size: 1rem; margin-bottom: .3rem; }
  .best-wrap { color: #53d8fb; font-size: 1rem; margin: .5rem 0 1.5rem; }
  #result-bar-bg { background: #0f3460; border-radius: 8px; height: 16px; width: 100%; overflow: hidden; margin: 1rem 0 .5rem; }
  #result-bar { height: 16px; border-radius: 8px; background: #4caf50; transition: width 1s; width: 0%; }
  #over-reason { color: #aaa; font-size: .9rem; margin-bottom: .5rem; }
</style>
</head>
<body>

<div id="start-screen" class="screen">
  <h1>🧠 An Foclóir</h1>
  <p class="subtitle">Tosaitheoirí | 🔊 Fuaim Chonnacht</p>
  <p style="color:#aaa;margin-bottom:2rem;line-height:1.9">
    100 focal. Roghnaigh an sainmhíniú ceart.<br>
    10 croí agat.<br>
    Scór céatadáin ag an deireadh.<br>
    <span style="color:#53d8fb">↑ barr &nbsp;·&nbsp; ↓ bun</span> le roghnú
  </p>
  <button class="big-btn" onclick="initGame()">Tosaígh</button>
</div>

<div id="game-screen" class="screen">
  <div class="top-row">
    <div><span class="stat-label">Focal</span><span id="word-num">1 / 100</span></div>
    <div><span class="stat-label">Croíthe</span><span id="lives-val">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</span></div>
    <div><span class="stat-label">Ceart</span><span id="score-running">0</span></div>
  </div>
  <div class="progress-wrap">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  </div>
  <div class="card" id="word-card">
    <div id="word-display"></div>
  </div>
  <div class="choices">
    <button class="choice-btn" id="choice-a" onclick="pick(0)"></button>
    <button class="choice-btn" id="choice-b" onclick="pick(1)"></button>
  </div>
  <p class="hint">↑ barr · ↓ bun</p>
</div>

<div id="over-screen" class="screen">
  <h1>Críochnaithe!</h1>
  <div id="final-pct">0%</div>
  <div id="result-bar-bg"><div id="result-bar"></div></div>
  <p class="final-detail"><span id="final-correct">0</span> ceart as <span id="final-total">0</span></p>
  <p id="over-reason"></p>
  <div class="best-wrap">🏆 Taifead: <span id="best-score">0%</span></div>
  <button class="big-btn" onclick="initGame()">Arís</button>
</div>

};
const WORDS = Object.keys(DICT);
const GAME_LENGTH = 100;
const MAX_LIVES = 10;

let gameWords, wordIndex, score, lives, locked, correctIdx;
let _ca = null;
let best = 0;
try { best = parseInt(localStorage.getItem('v4tosaitheoiri_best') || '0'); } catch(e){}

function playPron(word) {
  if (_ca) { _ca.pause(); _ca = null; }
  const a = new Audio('https://www.teanglann.ie/CanC/' + encodeURIComponent(word) + '.mp3');
  a.onerror = function(){};
  a.play().catch(function(){});
  _ca = a;
}

function sh(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDistractor(correctWord) {
  const correctDef = DICT[correctWord][0].toLowerCase();
  let attempts = 0;
  while (attempts < 20) {
    const w = WORDS[Math.floor(Math.random() * WORDS.length)];
    if (w !== correctWord && DICT[w][0].toLowerCase() !== correctDef) return DICT[w][0];
    attempts++;
  }
  return DICT[WORDS[0]][0];
}

function initGame() {
  gameWords = sh(WORDS).slice(0, GAME_LENGTH);
  wordIndex = 0; score = 0; lives = MAX_LIVES; locked = false;
  updateStats();
  nextWord();
  show('game-screen');
}

function updateStats() {
  document.getElementById('word-num').textContent = Math.min(wordIndex + 1, GAME_LENGTH) + ' / ' + GAME_LENGTH;
  document.getElementById('score-running').textContent = score;
  document.getElementById('lives-val').textContent = '❤️'.repeat(lives) + '🖤'.repeat(MAX_LIVES - lives);
  document.getElementById('progress-bar').style.width = (wordIndex / GAME_LENGTH * 100) + '%';
}

function nextWord() {
  if (wordIndex >= GAME_LENGTH) { gameOver('complete'); return; }
  locked = false;
  const word = gameWords[wordIndex];
  const correctDef = DICT[word][0];
  const wrongDef = getDistractor(word);
  correctIdx = Math.random() < 0.5 ? 0 : 1;
  const choices = correctIdx === 0 ? [correctDef, wrongDef] : [wrongDef, correctDef];

  document.getElementById('word-display').textContent = word;
  document.getElementById('word-card').className = 'card';

  const btns = [document.getElementById('choice-a'), document.getElementById('choice-b')];
  btns.forEach((b, i) => {
    b.textContent = (i === 0 ? '↑ ' : '↓ ') + choices[i];
    b.className = 'choice-btn';
    b.disabled = false;
  });

  updateStats();
  playPron(word);
}

function pick(idx) {
  if (locked) return;
  locked = true;
  const btns = [document.getElementById('choice-a'), document.getElementById('choice-b')];
  btns.forEach(b => b.disabled = true);

  if (idx === correctIdx) {
    score++;
    btns[idx].className = 'choice-btn selected-correct';
    document.getElementById('word-card').className = 'card flash-correct';
  } else {
    lives--;
    btns[idx].className = 'choice-btn selected-wrong';
    btns[correctIdx].className = 'choice-btn reveal-correct';
    document.getElementById('word-card').className = 'card flash-wrong';
  }

  wordIndex++;
  updateStats();

  if (lives <= 0) {
    setTimeout(() => gameOver('lives'), 900);
  } else {
    setTimeout(nextWord, 900);
  }
}

function gameOver(reason) {
  const total = wordIndex;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  if (pct > best) { best = pct; try { localStorage.setItem('v4tosaitheoiri_best', best); } catch(e){} }
  document.getElementById('final-pct').textContent = pct + '%';
  document.getElementById('final-correct').textContent = score;
  document.getElementById('final-total').textContent = total;
  document.getElementById('best-score').textContent = best + '%';
  document.getElementById('over-reason').textContent = reason === 'complete' ? '✓ 100 focal críochnaithe!' : '💔 Croíthe caite!';
  show('over-screen');
  setTimeout(() => { document.getElementById('result-bar').style.width = pct + '%'; }, 100);
}

function show(id) {
  ['start-screen','game-screen','over-screen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp') { e.preventDefault(); pick(0); }
  if (e.key === 'ArrowDown') { e.preventDefault(); pick(1); }
});

show('start-screen');
